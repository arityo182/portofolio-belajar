# ===========================================
# Prometheus Configuration — RS Medika Sentosa
# ===========================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'medika-sentosa'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
