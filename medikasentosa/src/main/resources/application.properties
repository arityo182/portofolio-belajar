spring.application.name=medikasentosa

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/medika_sentosa
spring.datasource.username=core
spring.datasource.password=arie12345
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Upload File
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=btaIMo#,.ayTmcIF{jH|i[g3uZ2%{6J2gr,6pJi.yc4
app.jwt.expiration-ms=86400000

# FastAPI
app.fastapi.url=http://localhost:8001

# Redis Cache (via Docker — medika-redis di localhost:6379)
spring.data.redis.host=localhost
spring.data.redis.port=6379
# SEMENTARA disable Redis cache — ada konflik serialisasi dgn list kosong
# Aktifkan lagi setelah issue GenericJackson2JsonRedisSerializer diperbaiki
spring.cache.type=simple
spring.cache.redis.time-to-live=3600000

# ============================================
# Actuator + Prometheus Monitoring
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
