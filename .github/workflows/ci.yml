name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Unit Tests ────────────────────
  backend-test:
    name: Backend — Java 21 Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medika_sentosa
          POSTGRES_USER: core
          POSTGRES_PASSWORD: arie12345
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        working-directory: medikasentosa
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/medika_sentosa
          SPRING_DATASOURCE_USERNAME: core
          SPRING_DATASOURCE_PASSWORD: arie12345
        run: ./gradlew test --no-daemon

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: medikasentosa/build/reports/tests/test/
          retention-days: 7

  # ─── ML Service Import Check ───────────────
  ml-service-check:
    name: ML Service — Python Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ml-service
        run: |
          pip install -r requirements.txt --break-system-packages 2>/dev/null || \
          pip install fastapi uvicorn pydantic python-multipart tensorflow opencv-python-headless numpy pillow --break-system-packages

      - name: Verify imports
        working-directory: ml-service
        run: python -c "from app.main import app; print('✅ All imports OK')"

      - name: Check model file (skip if not present)
        working-directory: ml-service
        run: |
          if [ -f models/EfficientNetV2_FineTuning.keras ]; then
            echo "✅ Model file found"
          else
            echo "⚠️  Model file NOT found — expected (too large for Git)"
          fi

  # ─── Frontend Build & TypeCheck ────────────
  frontend-check:
    name: Frontend — TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hospital-frontend/package-lock.json

      - name: Install dependencies
        working-directory: hospital-frontend
        run: npm ci

      - name: TypeScript Check
        working-directory: hospital-frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: hospital-frontend
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hospital-frontend/dist/
          retention-days: 7

  # ─── Docker Build (Opsional) ──────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-test, ml-service-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: medikasentosa
          file: medikasentosa/Dockerfile
          push: false
          load: true
          tags: medika-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: hospital-frontend
          file: hospital-frontend/Dockerfile
          push: false
          load: true
          tags: medika-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images
        run: docker images medika-*
